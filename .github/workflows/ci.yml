name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # node-pty requires native compilation — rebuild after npm ci
      - name: Rebuild native modules
        run: npm run rebuild
        continue-on-error: true  # node-pty is optional; skip if toolchain unavailable

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
